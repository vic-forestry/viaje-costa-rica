<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Víctor & Celeste</title>
<style>
  :root {
    --bg: #faf9f5;
    --card: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --line: rgba(0,0,0,0.06);
    --text: #1a1a18;
    --text-mute: #6b6a64;
    --text-hint: #9a988f;
    --vic: #185fa5; --vic-bg: #e6f1fb; --vic-text: #0c447c;
    --cel: #993556; --cel-bg: #fbeaf0; --cel-text: #72243e;
    --mundial: #3b6d11; --mundial-bg: #eaf3de; --mundial-text: #27500a;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1f1e1c; --card: #2a2926;
      --border: rgba(255,255,255,0.12); --border-strong: rgba(255,255,255,0.2);
      --line: rgba(255,255,255,0.07);
      --text: #ededeb; --text-mute: #a8a69e; --text-hint: #75736b;
      --vic: #85b7eb; --vic-bg: #123a5e; --vic-text: #b5d4f4;
      --cel: #ed93b1; --cel-bg: #5e2034; --cel-text: #f4c0d1;
      --mundial: #97c459; --mundial-bg: #2f4a14; --mundial-text: #c0dd97;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.45;
    padding: 14px; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 900px; margin: 0 auto; }

  header { margin-bottom: 14px; }
  h1 { font-size: 20px; font-weight: 600; }
  .sub { color: var(--text-mute); font-size: 13px; margin-top: 2px; }
  .legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; font-size: 13px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--text-mute); }
  .dot { width: 11px; height: 11px; border-radius: 3px; }
  .dot.vic { background: var(--vic); } .dot.cel { background: var(--cel); } .dot.mundial { background: var(--mundial); }

  .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .bar select { font-family: inherit; font-size: 13px; padding: 6px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--card); color: var(--text); }
  .reset { font-family: inherit; font-size: 12px; padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: none; color: var(--text-mute); cursor: pointer; margin-left: auto; }
  .reset:hover { color: var(--cel); border-color: var(--cel); }

  .sync-badge {
    font-size: 12px; padding: 5px 10px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border-strong); color: var(--text-mute);
    background: var(--card);
  }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .sync-badge.online .sync-dot { background: #3b6d11; }
  .sync-badge.online { color: var(--mundial-text); border-color: var(--mundial); background: var(--mundial-bg); }
  .sync-badge.error .sync-dot { background: #993556; }
  .sync-badge.error { color: var(--cel-text); border-color: var(--cel); background: var(--cel-bg); }

  .day { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .day-head { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border); }
  .day-name { font-weight: 600; font-size: 15px; text-transform: capitalize; }
  .day-date { color: var(--text-hint); font-size: 12px; margin-left: 6px; }
  .day-today .day-head { background: var(--vic-bg); }
  .day-today .day-name { color: var(--vic-text); }
  .day-add { font-family: inherit; font-size: 18px; line-height: 1; width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border-strong); background: none; color: var(--text-mute); cursor: pointer; }
  .day-add:hover { color: var(--vic); border-color: var(--vic); }

  .cols-head { display: grid; grid-template-columns: 44px 1fr 1fr; border-bottom: 1px solid var(--line); }
  .cols-head div { padding: 5px 8px; font-size: 12px; font-weight: 600; color: var(--text-mute); }
  .ch-vic { color: var(--vic) !important; }
  .ch-cel { color: var(--cel) !important; }

  .allday { display: grid; grid-template-columns: 44px 1fr 1fr; border-bottom: 1px solid var(--line); }
  .ad-label { font-size: 10px; color: var(--text-hint); padding: 6px 4px; text-align: right; border-right: 1px solid var(--line); line-height: 1.3; }
  .ad-cell { padding: 4px; }
  .col-vic { border-right: 1px solid var(--line); }

  .timeline { display: grid; grid-template-columns: 44px 1fr 1fr; }
  .hr-label { font-size: 11px; color: var(--text-hint); padding: 4px 6px; text-align: right; border-top: 1px solid var(--line); border-right: 1px solid var(--line); }
  .hr-cell { border-top: 1px solid var(--line); min-height: 30px; padding: 3px; }

  .ev { border-radius: 6px; padding: 5px 7px; font-size: 12.5px; margin-bottom: 3px; cursor: pointer; display: block; border-left: 3px solid; }
  .ev .ev-t { font-weight: 600; font-size: 11px; opacity: 0.85; display: block; }
  .ev .ev-n { display: block; }
  .ev .ev-loc { display: block; font-size: 11px; opacity: 0.75; margin-top: 1px; }
  .ev.vic { background: var(--vic-bg); color: var(--vic-text); border-color: var(--vic); }
  .ev.cel { background: var(--cel-bg); color: var(--cel-text); border-color: var(--cel); }
  .ev.mundial { background: var(--mundial-bg); color: var(--mundial-text); border-color: var(--mundial); cursor: default; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--card); width: 100%; max-width: 440px; border-radius: 18px 18px 0 0; padding: 20px 18px 32px; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 16px; }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text-mute); margin-bottom: 5px; font-weight: 500; }
  .field input, .field select { width: 100%; font-family: inherit; font-size: 15px; padding: 11px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button { flex: 1; font-family: inherit; font-size: 15px; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); cursor: pointer; background: var(--card); color: var(--text); font-weight: 500; }
  .btn-save { background: var(--vic) !important; color: #fff !important; border-color: var(--vic) !important; }
  .btn-del { background: none !important; border-color: var(--cel) !important; color: var(--cel) !important; flex: 0 0 auto !important; padding: 12px 16px !important; }

  .loading { text-align: center; padding: 40px; color: var(--text-mute); font-size: 14px; }

  @media (min-width: 600px) {
    .overlay { align-items: center; }
    .modal { border-radius: 16px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Calendario Víctor &amp; Celeste · Viaje CR</h1>
    <div class="sub">24 jun – 16 jul · Toca un evento para editarlo o el + para agregar</div>
    <div class="legend">
      <span><span class="dot vic"></span>Víctor</span>
      <span><span class="dot cel"></span>Celeste</span>
      <span><span class="dot mundial"></span>Mundial</span>
    </div>
  </header>

  <div class="bar">
    <div class="sync-badge" id="sync-badge">
      <span class="sync-dot"></span>
      <span id="sync-text">Conectando...</span>
    </div>
    <select id="filter">
      <option value="all">Ver todo</option>
      <option value="vic">Solo Víctor</option>
      <option value="cel">Solo Celeste</option>
      <option value="personal">Sin Mundial</option>
    </select>
    <button class="reset" id="reset">Restaurar eventos iniciales</button>
  </div>

  <div id="grid"><div class="loading">Cargando calendario...</div></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Evento</h2>
    <div class="field">
      <label>Nombre del evento</label>
      <input type="text" id="m-name" placeholder="¿Qué es?">
    </div>
    <div class="field">
      <label>Lugar</label>
      <input type="text" id="m-loc" placeholder="Opcional">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Hora</label>
        <input type="time" id="m-time">
      </div>
      <div class="field">
        <label>De quién</label>
        <select id="m-who">
          <option value="vic">Víctor</option>
          <option value="cel">Celeste</option>
          <option value="mundial">Mundial</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="m-del" style="display:none">Eliminar</button>
      <button id="m-cancel">Cancelar</button>
      <button class="btn-save" id="m-save">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, setDoc, deleteDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARkOMYQ0EYPnxbeWfIe5K3rGfYBkttnO0",
  authDomain: "viaje-cr.firebaseapp.com",
  projectId: "viaje-cr",
  storageBucket: "viaje-cr.firebasestorage.app",
  messagingSenderId: "636560244223",
  appId: "1:636560244223:web:34d31cc6e15913ee8bfbca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "eventos");

const seed = [
  {id:"v1", day:"2026-06-25", time:"18:30", title:"Celebración Andre y Juancho", loc:"Casa de Luli", who:"vic"},
  {id:"v2", day:"2026-06-26", time:"09:00", title:"Recibir a Esther", loc:"La casa", who:"vic"},
  {id:"v3", day:"2026-06-26", time:"12:30", title:"Almuerzo", loc:"Casa Andrea", who:"vic"},
  {id:"v4", day:"2026-06-28", time:"", title:"Cumple de Juancho", loc:"", who:"vic"},
  {id:"v5", day:"2026-06-29", time:"07:00", title:"Pilates + desayuno", loc:"Casa Andrea", who:"vic"},
  {id:"v6", day:"2026-06-29", time:"16:45", title:"Cita con Neurólogo", loc:"", who:"vic"},
  {id:"c1", day:"2026-06-25", time:"", title:"Mita", loc:"Casa de Mita", who:"cel"},
  {id:"c2", day:"2026-06-26", time:"", title:"Pito", loc:"Casa de Pito", who:"cel"},
  {id:"m1",  day:"2026-06-25", time:"14:00", title:"Curazao vs Costa de Marfil", loc:"", who:"mundial"},
  {id:"m2",  day:"2026-06-25", time:"14:00", title:"Ecuador vs Alemania", loc:"", who:"mundial"},
  {id:"m3",  day:"2026-06-25", time:"17:00", title:"Japón vs Suecia", loc:"", who:"mundial"},
  {id:"m4",  day:"2026-06-25", time:"17:00", title:"Túnez vs Países Bajos", loc:"", who:"mundial"},
  {id:"m5",  day:"2026-06-25", time:"20:00", title:"Turquía vs Estados Unidos", loc:"", who:"mundial"},
  {id:"m6",  day:"2026-06-25", time:"20:00", title:"Paraguay vs Australia", loc:"", who:"mundial"},
  {id:"m7",  day:"2026-06-26", time:"13:00", title:"Noruega vs Francia", loc:"", who:"mundial"},
  {id:"m8",  day:"2026-06-26", time:"13:00", title:"Senegal vs Irak", loc:"", who:"mundial"},
  {id:"m9",  day:"2026-06-26", time:"18:00", title:"Cabo Verde vs Arabia Saudita", loc:"", who:"mundial"},
  {id:"m10", day:"2026-06-26", time:"18:00", title:"Uruguay vs España", loc:"", who:"mundial"},
  {id:"m11", day:"2026-06-26", time:"21:00", title:"Egipto vs Irán", loc:"", who:"mundial"},
  {id:"m12", day:"2026-06-26", time:"21:00", title:"Nueva Zelanda vs Bélgica", loc:"", who:"mundial"},
  {id:"m13", day:"2026-06-27", time:"15:00", title:"Panamá vs Inglaterra", loc:"", who:"mundial"},
  {id:"m14", day:"2026-06-27", time:"15:00", title:"Croacia vs Ghana", loc:"", who:"mundial"},
  {id:"m15", day:"2026-06-27", time:"17:30", title:"Colombia vs Portugal", loc:"", who:"mundial"},
  {id:"m16", day:"2026-06-27", time:"17:30", title:"RD Congo vs Uzbekistán", loc:"", who:"mundial"},
  {id:"m17", day:"2026-06-27", time:"20:00", title:"Argelia vs Austria", loc:"", who:"mundial"},
  {id:"m18", day:"2026-06-27", time:"20:00", title:"Jordania vs Argentina", loc:"", who:"mundial"},
];

let events = [];
let editingId = null;
let addContext = null;
let seeded = false;

const days = [];
for (let d = new Date(2026,5,24); d <= new Date(2026,6,16); d.setDate(d.getDate()+1)) days.push(new Date(d));
const dayNames = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const monthNames = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtTime(t){ if(!t) return ""; const [h,m]=t.split(":").map(Number); const ap=h>=12?"pm":"am"; const h12=h%12===0?12:h%12; return m===0?`${h12}${ap}`:`${h12}:${String(m).padStart(2,"0")}${ap}`; }

function setSyncStatus(state, text) {
  const badge = document.getElementById("sync-badge");
  const txt = document.getElementById("sync-text");
  badge.className = "sync-badge " + state;
  txt.textContent = text;
}

// Listen in real time
onSnapshot(col, (snap) => {
  events = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
  setSyncStatus("online", "En vivo ✓");
  if (!seeded && events.length === 0) {
    seeded = true;
    seedData();
  } else {
    seeded = true;
    render();
  }
}, (err) => {
  setSyncStatus("error", "Sin conexión");
  console.error(err);
});

async function seedData() {
  const batch = writeBatch(db);
  seed.forEach(e => {
    const ref = doc(col, e.id);
    batch.set(ref, e);
  });
  await batch.commit();
}

function render() {
  const filter = document.getElementById("filter").value;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const todayIso = iso(new Date());

  days.forEach(d => {
    const dIso = iso(d);
    let dayEvs = events.filter(e => e.day === dIso);
    if (filter === "vic") dayEvs = dayEvs.filter(e => e.who === "vic");
    else if (filter === "cel") dayEvs = dayEvs.filter(e => e.who === "cel");
    else if (filter === "personal") dayEvs = dayEvs.filter(e => e.who !== "mundial");

    const card = document.createElement("div");
    card.className = "day" + (dIso === todayIso ? " day-today" : "");

    const head = document.createElement("div");
    head.className = "day-head";
    head.innerHTML = `<div><span class="day-name">${dayNames[d.getDay()]}</span><span class="day-date">${d.getDate()} ${monthNames[d.getMonth()]}</span></div>`;
    const addBtn = document.createElement("button");
    addBtn.className = "day-add"; addBtn.textContent = "+";
    addBtn.onclick = () => openModal(null, dIso);
    head.appendChild(addBtn);
    card.appendChild(head);

    const ch = document.createElement("div");
    ch.className = "cols-head";
    ch.innerHTML = `<div></div><div class="ch-vic">Víctor</div><div class="ch-cel">Celeste</div>`;
    card.appendChild(ch);

    const allDay = dayEvs.filter(e => !e.time);
    if (allDay.length) {
      const ad = document.createElement("div");
      ad.className = "allday";
      const adLabel = document.createElement("div"); adLabel.className = "ad-label"; adLabel.textContent = "todo día";
      const cVic = document.createElement("div"); cVic.className = "ad-cell col-vic";
      const cCel = document.createElement("div"); cCel.className = "ad-cell";
      allDay.filter(e => e.who !== "cel").forEach(e => cVic.appendChild(evEl(e)));
      allDay.filter(e => e.who === "cel").forEach(e => cCel.appendChild(evEl(e)));
      ad.appendChild(adLabel); ad.appendChild(cVic); ad.appendChild(cCel);
      card.appendChild(ad);
    }

    const timed = dayEvs.filter(e => e.time);
    if (timed.length) {
      const hours = timed.map(e => parseInt(e.time.split(":")[0]));
      const minH = Math.min(...hours);
      const maxH = Math.max(...hours);
      const tl = document.createElement("div");
      tl.className = "timeline";
      for (let h = minH; h <= maxH; h++) {
        const lbl = document.createElement("div"); lbl.className = "hr-label"; lbl.textContent = fmtTime(String(h).padStart(2,"0")+":00");
        const cV = document.createElement("div"); cV.className = "hr-cell col-vic";
        const cC = document.createElement("div"); cC.className = "hr-cell";
        timed.filter(e => parseInt(e.time.split(":")[0]) === h).forEach(e => {
          (e.who === "cel" ? cC : cV).appendChild(evEl(e));
        });
        tl.appendChild(lbl); tl.appendChild(cV); tl.appendChild(cC);
      }
      card.appendChild(tl);
    }

    if (!allDay.length && !timed.length) {
      const free = document.createElement("div");
      free.style.cssText = "padding:10px 14px;font-size:13px;color:var(--text-hint);font-style:italic;";
      free.textContent = "Día libre";
      card.appendChild(free);
    }

    grid.appendChild(card);
  });
}

function evEl(e) {
  const el = document.createElement("div");
  el.className = "ev " + e.who;
  el.innerHTML = `${e.time ? `<span class="ev-t">${fmtTime(e.time)}</span>` : ""}<span class="ev-n"></span>${e.loc ? `<span class="ev-loc">📍 </span>` : ""}`;
  el.querySelector(".ev-n").textContent = e.title;
  if (e.loc) el.querySelector(".ev-loc").textContent = "📍 " + e.loc;
  if (e.who !== "mundial") el.onclick = () => openModal(e.firestoreId, e.day);
  return el;
}

const overlay = document.getElementById("overlay");

function openModal(firestoreId, dayIso) {
  editingId = firestoreId; addContext = dayIso;
  if (firestoreId) {
    const e = events.find(x => x.firestoreId === firestoreId);
    document.getElementById("modal-title").textContent = "Editar evento";
    document.getElementById("m-name").value = e.title;
    document.getElementById("m-loc").value = e.loc || "";
    document.getElementById("m-time").value = e.time || "";
    document.getElementById("m-who").value = e.who;
    document.getElementById("m-del").style.display = "block";
  } else {
    document.getElementById("modal-title").textContent = "Nuevo evento";
    document.getElementById("m-name").value = "";
    document.getElementById("m-loc").value = "";
    document.getElementById("m-time").value = "";
    document.getElementById("m-who").value = "vic";
    document.getElementById("m-del").style.display = "none";
  }
  overlay.classList.add("open");
  setTimeout(() => document.getElementById("m-name").focus(), 80);
}
function closeModal(){ overlay.classList.remove("open"); editingId = null; }

document.getElementById("m-save").onclick = async () => {
  const title = document.getElementById("m-name").value.trim();
  if (!title) { document.getElementById("m-name").focus(); return; }
  const data = {
    title,
    loc: document.getElementById("m-loc").value.trim(),
    time: document.getElementById("m-time").value,
    who: document.getElementById("m-who").value,
    day: addContext
  };
  closeModal();
  if (editingId) {
    await setDoc(doc(db, "eventos", editingId), data);
  } else {
    await addDoc(col, data);
  }
};

document.getElementById("m-del").onclick = async () => {
  if (editingId && confirm("¿Eliminar este evento?")) {
    const id = editingId; closeModal();
    await deleteDoc(doc(db, "eventos", id));
  }
};

document.getElementById("m-cancel").onclick = closeModal;
overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
document.getElementById("filter").onchange = render;

document.getElementById("reset").onclick = async () => {
  if (confirm("¿Restaurar eventos iniciales? Los cambios que agregaron se perderán.")) {
    const batch = writeBatch(db);
    events.forEach(e => { if (e.firestoreId && !e.firestoreId.startsWith("u")) return; if (e.firestoreId) batch.delete(doc(db, "eventos", e.firestoreId)); });
    seed.forEach(e => batch.set(doc(col, e.id), e));
    await batch.commit();
  }
};
</script>
</body>
</html>
