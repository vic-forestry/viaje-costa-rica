<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Víctor & Celeste · Viaje CR</title>
<style>
:root {
  --bg: #f5f4f0;
  --card: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.16);
  --line: rgba(0,0,0,0.055);
  --text: #1a1a18;
  --text-mute: #6b6a64;
  --text-hint: #aaa89f;
  --vic: #185fa5; --vic-bg: #e6f1fb; --vic-text: #0c447c; --vic-border: #85b7eb;
  --cel: #993556; --cel-bg: #fbeaf0; --cel-text: #72243e; --cel-border: #ed93b1;
  --mundial: #3b6d11; --mundial-bg: #eaf3de; --mundial-text: #27500a; --mundial-border: #97c459;
  --radius: 12px; --radius-sm: 7px;
  --head-h: 46px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1b19; --card: #272521;
    --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.18);
    --line: rgba(255,255,255,0.065);
    --text: #edecea; --text-mute: #a8a69e; --text-hint: #6a6860;
    --vic: #85b7eb; --vic-bg: #0e3356; --vic-text: #b5d4f4; --vic-border: #378add;
    --cel: #ed93b1; --cel-bg: #521a30; --cel-text: #f4c0d1; --cel-border: #d4537e;
    --mundial: #97c459; --mundial-bg: #253d0d; --mundial-text: #c0dd97; --mundial-border: #639922;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; padding: 12px; }
.wrap { max-width: 860px; margin: 0 auto; }

/* HEADER */
header { margin-bottom: 14px; }
h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.3px; }
.sub { color: var(--text-mute); font-size: 13px; margin-top: 2px; }
.legend { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; font-size: 12px; }
.legend span { display: inline-flex; align-items: center; gap: 5px; color: var(--text-mute); }
.dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.dot.vic { background: var(--vic); } .dot.cel { background: var(--cel); } .dot.mundial { background: var(--mundial); }

/* TOP BAR */
.bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.bar select { font-family: inherit; font-size: 13px; padding: 6px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--card); color: var(--text); }
.sync-badge { font-size: 12px; padding: 5px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border-strong); color: var(--text-mute); background: var(--card); white-space: nowrap; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-hint); flex-shrink: 0; }
.sync-badge.online { color: var(--mundial-text); border-color: var(--mundial-border); background: var(--mundial-bg); }
.sync-badge.online .sync-dot { background: var(--mundial); }
.sync-badge.error { color: var(--cel-text); border-color: var(--cel-border); background: var(--cel-bg); }
.sync-badge.error .sync-dot { background: var(--cel); }
.btn-ghost { font-family: inherit; font-size: 12px; padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: none; color: var(--text-mute); cursor: pointer; margin-left: auto; white-space: nowrap; }
.btn-ghost:hover { color: var(--cel); border-color: var(--cel); }
.btn-expand { font-family: inherit; font-size: 12px; padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: none; color: var(--text-mute); cursor: pointer; white-space: nowrap; }
.btn-expand:hover { color: var(--vic); border-color: var(--vic); }

/* DAY CARD */
.day { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.day-today { border-color: var(--vic-border); border-width: 1.5px; }

.day-head {
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px; height: var(--head-h); cursor: pointer; user-select: none;
}
.day-today .day-head { background: var(--vic-bg); }
.day-chevron { font-size: 14px; color: var(--text-hint); transition: transform .2s; flex-shrink: 0; line-height: 1; }
.day.open .day-chevron { transform: rotate(90deg); }
.day-name { font-weight: 600; font-size: 14px; text-transform: capitalize; min-width: 90px; }
.day-today .day-name { color: var(--vic-text); }
.day-date { color: var(--text-hint); font-size: 12px; }
.day-pills { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; justify-content: flex-end; overflow: hidden; }
.pill { font-size: 10.5px; padding: 2px 7px; border-radius: 12px; white-space: nowrap; font-weight: 500; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
.pill.vic { background: var(--vic-bg); color: var(--vic-text); }
.pill.cel { background: var(--cel-bg); color: var(--cel-text); }
.pill.mundial { background: var(--mundial-bg); color: var(--mundial-text); }
.day-add-btn { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-strong); background: none; color: var(--text-mute); cursor: pointer; font-size: 17px; line-height: 1; display: flex; align-items: center; justify-content: center; }
.day-add-btn:hover { color: var(--vic); border-color: var(--vic); }

/* DAY BODY */
.day-body { display: none; border-top: 1px solid var(--line); }
.day.open .day-body { display: block; }

.cols-head { display: grid; grid-template-columns: 42px 1fr 1fr; border-bottom: 1px solid var(--line); }
.cols-head div { padding: 5px 8px; font-size: 11px; font-weight: 600; }
.ch-vic { color: var(--vic) !important; }
.ch-cel { color: var(--cel) !important; }

/* ALL DAY ROW */
.allday-row { display: grid; grid-template-columns: 42px 1fr 1fr; border-bottom: 1px solid var(--line); min-height: 30px; }
.allday-label { font-size: 10px; color: var(--text-hint); padding: 5px 4px 5px 0; text-align: right; border-right: 1px solid var(--line); display: flex; align-items: center; justify-content: flex-end; }
.allday-cell { padding: 4px; }
.allday-cell.col-vic { border-right: 1px solid var(--line); }

/* TIMELINE */
.timeline { display: grid; grid-template-columns: 42px 1fr 1fr; }
.hr-label { font-size: 10px; color: var(--text-hint); padding: 3px 5px 3px 0; text-align: right; border-top: 1px solid var(--line); border-right: 1px solid var(--line); line-height: 24px; height: 26px; }
.hr-cell { border-top: 1px solid var(--line); min-height: 26px; padding: 2px 3px; }
.hr-cell.col-vic { border-right: 1px solid var(--line); }

/* EVENTS */
.ev { border-radius: 5px; padding: 4px 6px; font-size: 12px; margin-bottom: 2px; cursor: pointer; border-left: 3px solid; display: block; }
.ev .ev-t { font-weight: 600; font-size: 10.5px; opacity: 0.8; display: block; }
.ev .ev-n { display: block; line-height: 1.3; }
.ev .ev-loc { display: block; font-size: 10.5px; opacity: 0.7; margin-top: 1px; }
.ev .ev-end { display: block; font-size: 10px; opacity: 0.65; margin-top: 1px; font-style: italic; }
.ev.vic { background: var(--vic-bg); color: var(--vic-text); border-color: var(--vic); }
.ev.cel { background: var(--cel-bg); color: var(--cel-text); border-color: var(--cel); }
.ev.mundial { background: var(--mundial-bg); color: var(--mundial-text); border-color: var(--mundial); cursor: default; }
.ev.multiday { opacity: 0.85; }

.free-msg { padding: 10px 14px; font-size: 12px; color: var(--text-hint); font-style: italic; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.48); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--card); width: 100%; max-width: 460px; border-radius: 18px 18px 0 0; padding: 18px 16px 36px; max-height: 92vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto 14px; }
.modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 11px; color: var(--text-mute); margin-bottom: 4px; font-weight: 500; letter-spacing: 0.2px; }
.field input, .field select { width: 100%; font-family: inherit; font-size: 15px; padding: 10px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); }
.field-row { display: flex; gap: 8px; }
.field-row .field { flex: 1; }
.field-hint { font-size: 11px; color: var(--text-hint); margin-top: 3px; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.modal-actions button { flex: 1; font-family: inherit; font-size: 15px; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); cursor: pointer; background: var(--card); color: var(--text); font-weight: 500; }
.btn-save { background: var(--vic) !important; color: #fff !important; border-color: var(--vic) !important; }
.btn-del { background: none !important; border-color: var(--cel-border) !important; color: var(--cel) !important; flex: 0 0 auto !important; padding: 12px 14px !important; }

.loading { text-align: center; padding: 40px 20px; color: var(--text-mute); font-size: 14px; }

@media (min-width: 580px) {
  .overlay { align-items: center; }
  .modal { border-radius: 16px; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Víctor &amp; Celeste · Viaje CR 🇨🇷</h1>
    <div class="sub">24 jun – 16 jul · Toca ▶ para abrir un día, + para agregar</div>
    <div class="legend">
      <span><span class="dot vic"></span>Víctor</span>
      <span><span class="dot cel"></span>Celeste</span>
      <span><span class="dot mundial"></span>Mundial</span>
    </div>
  </header>

  <div class="bar">
    <div class="sync-badge" id="sync-badge"><span class="sync-dot"></span><span id="sync-text">Conectando...</span></div>
    <select id="filter">
      <option value="all">Ver todo</option>
      <option value="vic">Solo Víctor</option>
      <option value="cel">Solo Celeste</option>
      <option value="personal">Sin Mundial</option>
    </select>
    <button class="btn-expand" id="btn-expand">Expandir todo</button>
    <button class="btn-ghost" id="reset">Restaurar</button>
  </div>

  <div id="grid"><div class="loading">Cargando calendario...</div></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Evento</h2>
    <div class="field">
      <label>NOMBRE</label>
      <input type="text" id="m-name" placeholder="¿Qué es?">
    </div>
    <div class="field">
      <label>LUGAR</label>
      <input type="text" id="m-loc" placeholder="Opcional">
    </div>
    <div class="field-row">
      <div class="field">
        <label>FECHA INICIO</label>
        <input type="date" id="m-day" min="2026-06-24" max="2026-07-16">
      </div>
      <div class="field">
        <label>HORA INICIO</label>
        <input type="time" id="m-time">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>FECHA FIN</label>
        <input type="date" id="m-endday" min="2026-06-24" max="2026-07-16">
        <div class="field-hint">Opcional — para eventos de varios días</div>
      </div>
      <div class="field">
        <label>HORA FIN</label>
        <input type="time" id="m-endtime">
      </div>
    </div>
    <div class="field">
      <label>DE QUIÉN</label>
      <select id="m-who">
        <option value="vic">Víctor</option>
        <option value="cel">Celeste</option>
        <option value="mundial">Mundial</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="m-del" style="display:none">Eliminar</button>
      <button id="m-cancel">Cancelar</button>
      <button class="btn-save" id="m-save">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, setDoc, deleteDoc, doc, writeBatch }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARkOMYQ0EYPnxbeWfIe5K3rGfYBkttnO0",
  authDomain: "viaje-cr.firebaseapp.com",
  projectId: "viaje-cr",
  storageBucket: "viaje-cr.firebasestorage.app",
  messagingSenderId: "636560244223",
  appId: "1:636560244223:web:34d31cc6e15913ee8bfbca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "eventos");

const seed = [
  {id:"v1",  day:"2026-06-25", time:"18:30", endday:"", endtime:"", title:"Celebración Andre y Juancho", loc:"Casa de Luli", who:"vic"},
  {id:"v2",  day:"2026-06-26", time:"09:00", endday:"", endtime:"", title:"Recibir a Esther", loc:"La casa", who:"vic"},
  {id:"v3",  day:"2026-06-26", time:"12:30", endday:"", endtime:"", title:"Almuerzo", loc:"Casa Andrea", who:"vic"},
  {id:"v4",  day:"2026-06-28", time:"",      endday:"", endtime:"", title:"Cumple de Juancho", loc:"", who:"vic"},
  {id:"v5",  day:"2026-06-29", time:"07:00", endday:"", endtime:"", title:"Pilates + desayuno", loc:"Casa Andrea", who:"vic"},
  {id:"v6",  day:"2026-06-29", time:"16:45", endday:"", endtime:"", title:"Cita con Neurólogo", loc:"", who:"vic"},
  {id:"c1",  day:"2026-06-25", time:"",      endday:"", endtime:"", title:"Mita", loc:"Casa de Mita", who:"cel"},
  {id:"c2",  day:"2026-06-26", time:"",      endday:"", endtime:"", title:"Pito", loc:"Casa de Pito", who:"cel"},
  {id:"m1",  day:"2026-06-25", time:"14:00", endday:"", endtime:"", title:"Curazao vs Costa de Marfil", loc:"", who:"mundial"},
  {id:"m2",  day:"2026-06-25", time:"14:00", endday:"", endtime:"", title:"Ecuador vs Alemania", loc:"", who:"mundial"},
  {id:"m3",  day:"2026-06-25", time:"17:00", endday:"", endtime:"", title:"Japón vs Suecia", loc:"", who:"mundial"},
  {id:"m4",  day:"2026-06-25", time:"17:00", endday:"", endtime:"", title:"Túnez vs Países Bajos", loc:"", who:"mundial"},
  {id:"m5",  day:"2026-06-25", time:"20:00", endday:"", endtime:"", title:"Turquía vs Estados Unidos", loc:"", who:"mundial"},
  {id:"m6",  day:"2026-06-25", time:"20:00", endday:"", endtime:"", title:"Paraguay vs Australia", loc:"", who:"mundial"},
  {id:"m7",  day:"2026-06-26", time:"13:00", endday:"", endtime:"", title:"Noruega vs Francia", loc:"", who:"mundial"},
  {id:"m8",  day:"2026-06-26", time:"13:00", endday:"", endtime:"", title:"Senegal vs Irak", loc:"", who:"mundial"},
  {id:"m9",  day:"2026-06-26", time:"18:00", endday:"", endtime:"", title:"Cabo Verde vs Arabia Saudita", loc:"", who:"mundial"},
  {id:"m10", day:"2026-06-26", time:"18:00", endday:"", endtime:"", title:"Uruguay vs España", loc:"", who:"mundial"},
  {id:"m11", day:"2026-06-26", time:"21:00", endday:"", endtime:"", title:"Egipto vs Irán", loc:"", who:"mundial"},
  {id:"m12", day:"2026-06-26", time:"21:00", endday:"", endtime:"", title:"Nueva Zelanda vs Bélgica", loc:"", who:"mundial"},
  {id:"m13", day:"2026-06-27", time:"15:00", endday:"", endtime:"", title:"Panamá vs Inglaterra", loc:"", who:"mundial"},
  {id:"m14", day:"2026-06-27", time:"15:00", endday:"", endtime:"", title:"Croacia vs Ghana", loc:"", who:"mundial"},
  {id:"m15", day:"2026-06-27", time:"17:30", endday:"", endtime:"", title:"Colombia vs Portugal", loc:"", who:"mundial"},
  {id:"m16", day:"2026-06-27", time:"17:30", endday:"", endtime:"", title:"RD Congo vs Uzbekistán", loc:"", who:"mundial"},
  {id:"m17", day:"2026-06-27", time:"20:00", endday:"", endtime:"", title:"Argelia vs Austria", loc:"", who:"mundial"},
  {id:"m18", day:"2026-06-27", time:"20:00", endday:"", endtime:"", title:"Jordania vs Argentina", loc:"", who:"mundial"},
];

let events = [];
let editingId = null;
let addContext = null;
let seeded = false;
let expandAll = false;
const openDays = new Set();

// Build day list
const days = [];
for (let d = new Date(2026,5,24); d <= new Date(2026,6,16); d.setDate(d.getDate()+1)) days.push(new Date(d));
const dayNames = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const monthNames = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const HOURS = Array.from({length:24},(_,i)=>i);

function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtTime(t){ if(!t) return ""; const [h,m]=t.split(":").map(Number); const ap=h>=12?"pm":"am"; const h12=h%12===0?12:h%12; return m===0?`${h12}${ap}`:`${h12}:${String(m).padStart(2,"0")}${ap}`; }
function fmtDate(s){ if(!s) return ""; const [,mo,da]=s.split("-"); const months=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"]; return da+" "+months[parseInt(mo)-1]; }

// Get all days an event spans
function eventDays(e) {
  if (!e.endday || e.endday <= e.day) return [e.day];
  const result = [];
  const end = new Date(e.endday+"T12:00:00");
  for (let d = new Date(e.day+"T12:00:00"); d <= end; d.setDate(d.getDate()+1)) result.push(iso(d));
  return result;
}

function setSyncStatus(state, text) {
  const badge = document.getElementById("sync-badge");
  badge.className = "sync-badge " + state;
  document.getElementById("sync-text").textContent = text;
}

onSnapshot(col, (snap) => {
  events = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
  setSyncStatus("online", "En vivo ✓");
  if (!seeded && events.length === 0) { seeded = true; seedData(); }
  else { seeded = true; render(); }
}, () => setSyncStatus("error", "Sin conexión"));

async function seedData() {
  const batch = writeBatch(db);
  seed.forEach(e => batch.set(doc(col, e.id), e));
  await batch.commit();
}

function render() {
  const filter = document.getElementById("filter").value;
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const todayIso = iso(new Date());

  days.forEach(d => {
    const dIso = iso(d);

    // Gather events that appear on this day (including multi-day)
    let dayEvs = events.filter(e => {
      const span = eventDays(e);
      return span.includes(dIso);
    });
    if (filter === "vic") dayEvs = dayEvs.filter(e => e.who === "vic");
    else if (filter === "cel") dayEvs = dayEvs.filter(e => e.who === "cel");
    else if (filter === "personal") dayEvs = dayEvs.filter(e => e.who !== "mundial");

    const isToday = dIso === todayIso;
    const isOpen = openDays.has(dIso) || (expandAll);

    const card = document.createElement("div");
    card.className = "day" + (isToday ? " day-today" : "") + (isOpen ? " open" : "");
    card.dataset.iso = dIso;

    // HEAD
    const head = document.createElement("div");
    head.className = "day-head";

    const chevron = document.createElement("span");
    chevron.className = "day-chevron"; chevron.textContent = "▶";

    const nameSpan = document.createElement("span");
    nameSpan.className = "day-name"; nameSpan.textContent = dayNames[d.getDay()];

    const dateSpan = document.createElement("span");
    dateSpan.className = "day-date"; dateSpan.textContent = d.getDate() + " " + monthNames[d.getMonth()];

    // Pills preview (max 3)
    const pills = document.createElement("div");
    pills.className = "day-pills";
    const preview = dayEvs.filter(e => e.who !== "mundial").slice(0,3);
    preview.forEach(e => {
      const p = document.createElement("span");
      p.className = "pill " + e.who;
      p.textContent = (e.time ? fmtTime(e.time) + " " : "") + e.title;
      pills.appendChild(p);
    });
    if (dayEvs.filter(e=>e.who!=="mundial").length > 3) {
      const p = document.createElement("span");
      p.className = "pill"; p.style.cssText = "background:var(--border);color:var(--text-mute);";
      p.textContent = "+" + (dayEvs.filter(e=>e.who!=="mundial").length - 3) + " más";
      pills.appendChild(p);
    }

    const addBtn = document.createElement("button");
    addBtn.className = "day-add-btn"; addBtn.textContent = "+"; addBtn.title = "Agregar evento";
    addBtn.onclick = (ev) => { ev.stopPropagation(); openModal(null, dIso); };

    head.appendChild(chevron); head.appendChild(nameSpan); head.appendChild(dateSpan);
    head.appendChild(pills); head.appendChild(addBtn);

    head.onclick = () => {
      if (openDays.has(dIso)) openDays.delete(dIso);
      else openDays.add(dIso);
      card.classList.toggle("open");
    };

    card.appendChild(head);

    // BODY
    const body = document.createElement("div");
    body.className = "day-body";

    // Cols header
    const ch = document.createElement("div");
    ch.className = "cols-head";
    ch.innerHTML = `<div></div><div class="ch-vic">Víctor</div><div class="ch-cel">Celeste</div>`;
    body.appendChild(ch);

    // All-day events (no time, or multi-day continuations)
    const allDayEvs = dayEvs.filter(e => {
      const isStart = e.day === dIso;
      const isMultiDay = e.endday && e.endday > e.day;
      return !e.time || (isMultiDay && !isStart);
    });
    const allDayShown = allDayEvs.filter(e => !e.time);
    const continuations = dayEvs.filter(e => e.endday && e.endday > e.day && e.day !== dIso);

    if (allDayShown.length || continuations.length) {
      const row = document.createElement("div");
      row.className = "allday-row";
      const lbl = document.createElement("div"); lbl.className = "allday-label"; lbl.textContent = "todo el día";
      const cV = document.createElement("div"); cV.className = "allday-cell col-vic";
      const cC = document.createElement("div"); cC.className = "allday-cell";
      [...allDayShown, ...continuations].forEach(e => {
        (e.who === "cel" ? cC : cV).appendChild(evEl(e, dIso));
      });
      row.appendChild(lbl); row.appendChild(cV); row.appendChild(cC);
      body.appendChild(row);
    }

    // Timed events
    const timedEvs = dayEvs.filter(e => e.time && !(e.endday && e.endday > e.day && e.day !== dIso));

    const tl = document.createElement("div");
    tl.className = "timeline";
    HOURS.forEach(h => {
      const lbl = document.createElement("div");
      lbl.className = "hr-label";
      lbl.textContent = fmtTime(String(h).padStart(2,"0")+":00");
      const cV = document.createElement("div"); cV.className = "hr-cell col-vic";
      const cC = document.createElement("div"); cC.className = "hr-cell";
      timedEvs.filter(e => parseInt(e.time.split(":")[0]) === h).forEach(e => {
        (e.who === "cel" ? cC : cV).appendChild(evEl(e, dIso));
      });
      tl.appendChild(lbl); tl.appendChild(cV); tl.appendChild(cC);
    });
    body.appendChild(tl);

    if (!dayEvs.length) {
      const free = document.createElement("div"); free.className = "free-msg"; free.textContent = "Día libre";
      body.appendChild(free);
    }

    card.appendChild(body);
    grid.appendChild(card);
  });
}

function evEl(e, currentDay) {
  const el = document.createElement("div");
  const isMulti = e.endday && e.endday > e.day;
  const isContinuation = isMulti && e.day !== currentDay;
  el.className = "ev " + e.who + (isMulti ? " multiday" : "");

  let inner = "";
  if (e.time && !isContinuation) inner += `<span class="ev-t">${fmtTime(e.time)}</span>`;
  inner += `<span class="ev-n"></span>`;
  if (e.loc) inner += `<span class="ev-loc"></span>`;
  if (isMulti) {
    const endLabel = isContinuation ? `hasta ${fmtDate(e.endday)}` : `→ ${fmtDate(e.endday)}${e.endtime ? " "+fmtTime(e.endtime):""}`;
    inner += `<span class="ev-end">${endLabel}</span>`;
  }
  el.innerHTML = inner;
  el.querySelector(".ev-n").textContent = e.title;
  if (e.loc) el.querySelector(".ev-loc").textContent = "📍 " + e.loc;
  if (e.who !== "mundial") el.onclick = () => openModal(e.firestoreId, e.day);
  return el;
}

const overlay = document.getElementById("overlay");

function openModal(firestoreId, dayIso) {
  editingId = firestoreId; addContext = dayIso;
  if (firestoreId) {
    const e = events.find(x => x.firestoreId === firestoreId);
    document.getElementById("modal-title").textContent = "Editar evento";
    document.getElementById("m-name").value = e.title;
    document.getElementById("m-loc").value = e.loc || "";
    document.getElementById("m-day").value = e.day;
    document.getElementById("m-time").value = e.time || "";
    document.getElementById("m-endday").value = e.endday || "";
    document.getElementById("m-endtime").value = e.endtime || "";
    document.getElementById("m-who").value = e.who;
    document.getElementById("m-del").style.display = "";
  } else {
    document.getElementById("modal-title").textContent = "Nuevo evento";
    document.getElementById("m-name").value = "";
    document.getElementById("m-loc").value = "";
    document.getElementById("m-day").value = dayIso || "";
    document.getElementById("m-time").value = "";
    document.getElementById("m-endday").value = "";
    document.getElementById("m-endtime").value = "";
    document.getElementById("m-who").value = "vic";
    document.getElementById("m-del").style.display = "none";
  }
  overlay.classList.add("open");
  setTimeout(() => document.getElementById("m-name").focus(), 80);
}
function closeModal(){ overlay.classList.remove("open"); editingId = null; }

document.getElementById("m-save").onclick = async () => {
  const title = document.getElementById("m-name").value.trim();
  if (!title) { document.getElementById("m-name").focus(); return; }
  const data = {
    title,
    loc: document.getElementById("m-loc").value.trim(),
    day: document.getElementById("m-day").value || addContext,
    time: document.getElementById("m-time").value,
    endday: document.getElementById("m-endday").value,
    endtime: document.getElementById("m-endtime").value,
    who: document.getElementById("m-who").value,
  };
  closeModal();
  if (editingId) await setDoc(doc(db, "eventos", editingId), data);
  else await addDoc(col, data);
};

document.getElementById("m-del").onclick = async () => {
  if (editingId && confirm("¿Eliminar este evento?")) {
    const id = editingId; closeModal();
    await deleteDoc(doc(db, "eventos", id));
  }
};

document.getElementById("m-cancel").onclick = closeModal;
overlay.onclick = e => { if (e.target === overlay) closeModal(); };
document.getElementById("filter").onchange = render;

document.getElementById("btn-expand").onclick = () => {
  expandAll = !expandAll;
  if (expandAll) { days.forEach(d => openDays.add(iso(d))); document.getElementById("btn-expand").textContent = "Cerrar todo"; }
  else { openDays.clear(); document.getElementById("btn-expand").textContent = "Expandir todo"; }
  render();
};

document.getElementById("reset").onclick = async () => {
  if (confirm("¿Restaurar eventos iniciales? Se perderán los cambios.")) {
    const batch = writeBatch(db);
    events.forEach(e => { if (e.firestoreId) batch.delete(doc(db, "eventos", e.firestoreId)); });
    seed.forEach(e => batch.set(doc(col, e.id), e));
    await batch.commit();
  }
};
</script>
